# Triggers on every push to `main` (i.e. after a merged PR).
# Tier-A scope for this demo repo: build a reproducible image, scan it,
# push it to GHCR with an immutable tag + provenance + SBOM.
#
# In the original submission this workflow also bumps the image tag in a
# separate `infrastructure-env-dev` repo (GitOps) and runs smoke tests
# against the dev cluster. Those steps are out of scope here because they
# need a real Argo CD + infra repo, which I'm not deploying for this demo.
name: build-and-push

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false   # never cancel a deploy mid-flight

permissions:
  contents: read
  packages: write             # push to GHCR
  id-token: write             # OIDC (no long-lived registry credentials)

env:
  REGISTRY: ghcr.io

jobs:
  build-push:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute immutable tag and lowercase image path
        id: meta
        run: |
          set -eu
          SHORT_SHA="${GITHUB_SHA::7}"
          TS="$(date -u +%Y%m%d-%H%M%S)"
          # GHCR requires the owner segment in lowercase.
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          REPO_LC="$(echo "${GITHUB_REPOSITORY##*/}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_TAG="${SHORT_SHA}-${TS}"
          IMAGE_REF="${{ env.REGISTRY }}/${OWNER_LC}/${REPO_LC}:${IMAGE_TAG}"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"
          echo "Will push: ${IMAGE_REF}"

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.image_ref }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ steps.meta.outputs.image_tag }}
            APP_VERSION=${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Trivy image scan (HIGH+ blocks deploy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.image_ref }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          trivyignores: ./.trivyignore

      - name: Summary
        run: |
          echo "### Image pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.image_ref }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Provenance and SBOM attestations attached." >> "$GITHUB_STEP_SUMMARY"
