# Runs on every PR against `main`. Goal: catch problems before merge.
# Required checks in branch protection: lint-and-test, sast, sca, dockerfile-lint, image-scan.
name: PR checks

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"

# Cancel superseded runs on the same branch — saves runner minutes.
concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write   # for CodeQL / Trivy SARIF upload
  pull-requests: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install (clean, reproducible)
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

  sast:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

  sca:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      # Fails on HIGH/CRITICAL advisories in prod deps only.
      - name: npm audit (high+)
        run: npm audit --audit-level=high --omit=dev

  dockerfile-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - name: Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

  image-scan:
    # Build the image but DO NOT push from a PR — preview-only.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint-and-test, dockerfile-lint]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: pr-${{ github.event.pull_request.number }}:scan
          build-args: |
            GIT_SHA=${{ github.sha }}
            APP_VERSION=pr-${{ github.event.pull_request.number }}
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: pr-${{ github.event.pull_request.number }}:scan
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          format: sarif
          output: trivy.sarif
      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with: { sarif_file: trivy.sarif }
